<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f7fa;
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:3px solid #1f5aa6;
}

.header img{height:40px;}

.header-title{
  font-weight:bold;
  color:#1f5aa6;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

h2{
  text-align:center;
  color:#1f5aa6;
}

/* Boutons */
button{
  padding:15px;
  border:none;
  border-radius:8px;
  font-size:16px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
}

.take-btn{background:#1f5aa6;color:white;}
.retry-btn{background:#e67e22;color:white;}
.pdf-btn{background:#2ecc71;color:white;}
.smart-btn{background:#34495e;color:white;}

img{
  max-width:100%;
  margin-top:15px;
  border-radius:10px;
}

#result{
  margin-top:15px;
  font-size:14px;
  background:#ecf0f1;
  padding:10px;
  border-radius:8px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://www.cfnews.net/var/cfnews/storage/images/_aliases/medium/mediatheque/hd/standard-hd/logos/novares-art-logo-2019/1372329-3-fre-FR/Novares-ART-Logo-2019.png">
  <div class="header-title">Run@Rate Tool</div>
</div>

<div class="container">
<div class="card">

<h2>R@R Picture</h2>

<button class="take-btn" onclick="openCamera()">📷 TAKE PICTURE</button>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<img id="preview" style="display:none"/>

<div id="actions" style="display:none">
  <button class="retry-btn" onclick="retake()">🔁 RETAKE</button>
  <button class="pdf-btn" onclick="savePDF()">📄 SAVE AS PDF</button>
  <button class="smart-btn" onclick="convertToBD()">📊 Convert to BD-PI-B03</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

let imageData = null;

function openCamera(){
  document.getElementById("cameraInput").click();
}

const input = document.getElementById("cameraInput");

input.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    imageData = e.target.result;

    const preview = document.getElementById("preview");
    preview.src = imageData;
    preview.style.display = "block";

    document.getElementById("actions").style.display = "block";
  };

  reader.readAsDataURL(file);
});

function retake(){
  document.getElementById("preview").style.display = "none";
  document.getElementById("actions").style.display = "none";
  input.value = "";
}

function savePDF(){

  const img = new Image();
  img.src = imageData;

  img.onload = function(){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    const link = document.createElement('a');
    link.download = "RunAtRate_Image.jpg";
    link.href = canvas.toDataURL("image/jpeg");
    link.click();
  };
}

    }
