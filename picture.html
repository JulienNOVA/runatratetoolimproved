<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f7fa;
  text-align:center;
}

.container{
  padding:20px;
}

button{
  padding:15px;
  border:none;
  border-radius:8px;
  font-size:16px;
  width:100%;
  margin-top:10px;
}

.take-btn{background:#1f5aa6;color:white;}
.retry-btn{background:#e67e22;color:white;}
.pdf-btn{background:#2ecc71;color:white;}
.smart-btn{background:#34495e;color:white;}

img{
  max-width:100%;
  margin-top:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>R@R Picture</h2>

<!-- BUTTON TAKE -->
<button class="take-btn" onclick="openCamera()">📷 TAKE PICTURE</button>

<!-- INPUT CAMERA (hidden) -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<!-- IMAGE PREVIEW -->
<img id="preview" style="display:none"/>

<!-- ACTION BUTTONS -->
<div id="actions" style="display:none">
  <button class="retry-btn" onclick="retake()">🔁 RETAKE</button>
  <button class="pdf-btn" onclick="savePDF()">📄 SAVE AS PDF</button>
  <button class="smart-btn" onclick="generateSmart()">📊 BD-PD SMARTSHEET</button>
</div>

</div>

<script>

let imageData = null;

function openCamera(){
  document.getElementById("cameraInput").click();
}

const input = document.getElementById("cameraInput");

input.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    imageData = e.target.result;

    const preview = document.getElementById("preview");
    preview.src = imageData;
    preview.style.display = "block";

    document.getElementById("actions").style.display = "block";
  };

  reader.readAsDataURL(file);
});

function retake(){
  document.getElementById("preview").style.display = "none";
  document.getElementById("actions").style.display = "none";
  input.value = "";
}

function savePDF(){

  const img = new Image();
  img.src = imageData;

  img.onload = function(){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    const link = document.createElement('a');
    link.download = "RunAtRate_Image.pdf";

    // convert canvas → image → fake PDF download (simple trick)
    link.href = canvas.toDataURL("image/jpeg");

    link.click();
  };
}

function generateSmart(){
  alert("👉 BD-PD Smartsheet export à connecter (API / Excel / Power Automate)");
}

</script>

</body>
</html>
