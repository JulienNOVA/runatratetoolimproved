<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ OpenCV (scan) -->
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f7fa;
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:3px solid #1f5aa6;
}

.header img{height:40px;}

.header-title{
  font-weight:bold;
  color:#1f5aa6;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

h2{
  text-align:center;
  color:#1f5aa6;
}

button{
  padding:15px;
  border:none;
  border-radius:8px;
  font-size:16px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
}

.take-btn{background:#1f5aa6;color:white;}
.retry-btn{background:#e67e22;color:white;}
.scan-btn{background:#9b59b6;color:white;}
.pdf-btn{background:#2ecc71;color:white;}
.smart-btn{background:#34495e;color:white;}

img{
  max-width:100%;
  margin-top:15px;
  border-radius:10px;
}

#cameraInput{
  position:absolute;
  opacity:0;
  width:0;
  height:0;
}

#result{
  margin-top:15px;
  font-size:14px;
  background:#ecf0f1;
  padding:10px;
  border-radius:8px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://www.cfnews.net/var/cfnews/storage/images/_aliases/medium/mediatheque/hd/standard-hd/logos/novares-art-logo-2019/1372329-3-fre-FR/Novares-ART-Logo-2019.png">
  <div class="header-title">Run@Rate Tool</div>
</div>

<div class="container">
<div class="card">

<h2>R@R Picture</h2>

<button class="take-btn" onclick="openCamera()">📷 TAKE PICTURE</button>

<input id="cameraInput" type="file" accept="image/*" capture="environment">

<img id="preview" style="display:none"/>

<div id="actions" style="display:none">
  <button class="retry-btn" onclick="retake()">🔁 RETAKE</button>
  <button class="scan-btn" onclick="scanImage()">📄 SCAN IMAGE</button>
  <button class="pdf-btn" onclick="saveImage()">💾 SAVE IMAGE</button>
  <button class="smart-btn" onclick="convertToBD()">📊 Convert to BD-PI-B03</button>
</div>

<div id="result"></div>

</div>
</div>

<script>

let imageData = null;

function openCamera(){
  document.getElementById("cameraInput").click();
}

/* ✅ CAMERA */
document.getElementById("cameraInput").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
    imageData = e.target.result;

    const preview = document.getElementById("preview");
    preview.src = imageData;
    preview.style.display = "block";

    document.getElementById("actions").style.display = "block";
  };

  reader.readAsDataURL(file);
});

/* ✅ RETAKE */
function retake(){
  document.getElementById("preview").style.display = "none";
  document.getElementById("actions").style.display = "none";
  document.getElementById("cameraInput").value = "";
  document.getElementById("result").innerText = "";
}

/* ✅ SAVE */
function saveImage(){
  const link = document.createElement('a');
  link.href = imageData;
  link.download = "RunAtRate.jpg";
  link.click();
}

/* ✅ SCAN (effet document) */
function scanImage(){

  if(!imageData){
    alert("Take picture first");
    return;
  }

  if(typeof cv === "undefined"){
    alert("OpenCV not ready...");
    return;
  }

  const img = new Image();
  img.src = imageData;

  img.onload = function(){

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    let src = cv.imread(canvas);
    let gray = new cv.Mat();
    let thresh = new cv.Mat();

    // ✅ gris
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

    // ✅ contraste fort (scan look)
    cv.adaptiveThreshold(
      gray,
      thresh,
      255,
      cv.ADAPTIVE_THRESH_GAUSSIAN_C,
      cv.THRESH_BINARY,
      11,
      2
    );

    cv.imshow(canvas, thresh);

    imageData = canvas.toDataURL("image/jpeg");

    document.getElementById("preview").src = imageData;

    src.delete(); gray.delete(); thresh.delete();
  };
}

/* ✅ OCR */
async function convertToBD(){

  if(!imageData){
    alert("Take a picture first");
    return;
  }

  document.getElementById("result").innerText = "Reading board...";

  try{

    const response = await fetch("https://api.ocr.space/parse/image", {
      method: "POST",
      body: new URLSearchParams({
        base64Image: imageData,
        language: "eng"
      }),
      headers: { apikey: "helloworld" }
    });

    const data = await response.json();

    if(!data.ParsedResults){
      document.getElementById("result").innerText = "OCR failed ❌";
      return;
    }

    const text = data.ParsedResults[0].ParsedText;

    const targetPPH = text.match(/target.*?(\d+)/i)?.[1] || "N/A";
    const okParts = text.match(/ok.*?(\d+)/i)?.[1] || "N/A";
    const ngParts = text.match(/ng|scrap.*?(\d+)/i)?.[1] || "N/A";
    const downtime = text.match(/down.*?(\d+)/i)?.[1] || "N/A";

    document.getElementById("result").innerText =
`✅ OCR RESULT

${text}

------------------

Target PPH: ${targetPPH}
OK: ${okParts}
NG: ${ngParts}
Downtime: ${downtime}
`;

  }catch(e){
    document.getElementById("result").innerText = "Error OCR ❌";
  }
}

</script>

</body>
</html>
