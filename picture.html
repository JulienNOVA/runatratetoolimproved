<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  margin:0;
  background:#f5f7fa;
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  border-bottom:3px solid #1f5aa6;
}

.header img{height:40px;}

.header-title{
  font-weight:bold;
  color:#1f5aa6;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

h2{
  text-align:center;
  color:#1f5aa6;
}

button{
  padding:15px;
  border:none;
  border-radius:8px;
  font-size:16px;
  width:100%;
  margin-top:10px;
  font-weight:bold;
}

.take-btn{background:#1f5aa6;color:white;}
.retry-btn{background:#e67e22;color:white;}
.pdf-btn{background:#2ecc71;color:white;}
.smart-btn{background:#34495e;color:white;}

img{
  max-width:100%;
  margin-top:15px;
  border-radius:10px;
}

/* ✅ input invisible MAIS fonctionnel mobile */
#cameraInput{
  position:absolute;
  opacity:0;
  width:0;
  height:0;
}
</style>

</head>

<body>

<div class="header">
  <img src="https://www.cfnews.net/var/cfnews/storage/images/_aliases/medium/mediatheque/hd/standard-hd/logos/novares-art-logo-2019/1372329-3-fre-FR/Novares-ART-Logo-2019.png">
  <div class="header-title">Run@Rate Tool</div>
</div>

<div class="container">
<div class="card">

<h2>R@R Picture</h2>

<button class="take-btn" onclick="openCamera()">📷 TAKE PICTURE</button>

<input id="cameraInput" type="file" accept="image/*" capture="environment">

<img id="preview" style="display:none"/>

<div id="actions" style="display:none">
  <button class="retry-btn" onclick="retake()">🔁 RETAKE</button>
  <button class="pdf-btn" onclick="saveImage()">💾 SAVE IMAGE</button>
  <button class="smart-btn" onclick="convertToBD()">📊 Convert to BD-PI-B03</button>
</div>

</div>
</div>

<script>

let imageData = null;

function openCamera(){
  document.getElementById("cameraInput").click();
}

/* ✅ EVENT CAMÉRA (FIABLE) */
document.getElementById("cameraInput").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const url = URL.createObjectURL(file);

  imageData = url;

  const preview = document.getElementById("preview");
  preview.src = url;
  preview.style.display = "block";

  document.getElementById("actions").style.display = "block";
});

/* ✅ RETAKE */
function retake(){
  document.getElementById("preview").style.display = "none";
  document.getElementById("actions").style.display = "none";
  document.getElementById("cameraInput").value = "";
}

/* ✅ SAVE SIMPLE */
function saveImage(){

  const link = document.createElement('a');
  link.href = imageData;
  link.download = "RunAtRate.jpg";
  link.click();
}

/* ✅ OCR SAFE (ne casse rien) */
async function convertToBD(){

  if(!imageData){
    alert("Take a picture first");
    return;
  }

  alert("OCR coming next step ✅");

  // 👉 volontairement vide pour ne pas casser la caméra
  // prochaine étape = OCR + parsing
}

</script>

</body>
</html>
